version: '3.8'

services:
  frontend:
    build:
      context: ./frontend
      target: prod
    container_name: vedaai-frontend
    ports:
      - "3000:3000"
    # Production mode: use built image contents (no host bind mounts) so container node_modules and .next are used
    environment:
      - NODE_ENV=production
    command: ["npm","start"]
    depends_on:
      - backend
    # Reap zombie processes to keep memory lean
    init: true

  backend:
    build:
      context: ./backend
      target: prod
    container_name: vedaai-backend
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=development
      - PORT=5000
      - MONGODB_URI=mongodb://mongodb:27017/vedaai
      - REDIS_URL=redis://redis:6379
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - JWT_SECRET=vedaai-jwt-secret-dev
      - JWT_REFRESH_SECRET=vedaai-refresh-secret-dev
      - JWT_EXPIRES_IN=15m
      - JWT_REFRESH_EXPIRES_IN=7d
    depends_on:
      - mongodb
      - redis
    init: true

  mongodb:
    image: mongo:7
    container_name: vedaai-mongo
    # SAFE FOR DEV: Restrict WiredTiger cache heavily to 0.5 GB to reduce RAM consumption
    command: ["--wiredTigerCacheSizeGB", "0.5"]
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped
    logging:
      driver: "local"
      options:
        max-size: "10m"

  redis:
    image: redis:7-alpine
    container_name: vedaai-redis
    # SAFE FOR DEV: Disable disk persistence (save "") and append-only files to save disk I/O overhead
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    ports:
      - "6379:6379"
    restart: unless-stopped
    logging:
      driver: "local"
      options:
        max-size: "10m"

volumes:
  mongo_data: